name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
        # continue-on-error agar test gagal tidak block build & upload artifact
        continue-on-error: true

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Get version
        id: version
        shell: pwsh
        run: |
          # Pakai github.ref_name sebagai sumber utama:
          # Push tag v1.0.2  → ref_name = "v1.0.2" → version = "1.0.2"
          # Push ke branch   → ref_name = "main"   → fallback ke pubspec.yaml
          $refName = "${{ github.ref_name }}"
          Write-Host "ref_name: $refName"

          if ($refName -match "^v(\d+\.\d+.*)$") {
            $version = $Matches[1]
            Write-Host "Versi dari tag: $version"
          } else {
            $content = (Get-Content pubspec.yaml | Select-String "^version:").ToString()
            $version = ($content -replace "version:\s*", "" -replace "\+.*", "").Trim()
            Write-Host "Versi dari pubspec: $version"
          }

          Write-Host "Final VERSION=$version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create ZIP artifact
        shell: pwsh
        run: |
          $buildPath = "build\windows\x64\runner\Release"
          $version   = "${{ steps.version.outputs.VERSION }}"
          $zipName   = "SyncDashboard-Windows-v$version.zip"
          Write-Host "Creating ZIP: $zipName"
          Compress-Archive -Path "$buildPath\*" -DestinationPath $zipName
          Write-Host "ZIP created successfully"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SyncDashboard-Windows-v${{ steps.version.outputs.VERSION }}
          path: build/windows/x64/runner/Release/
          retention-days: 30

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: SyncDashboard-Windows-v${{ steps.version.outputs.VERSION }}-zip
          path: SyncDashboard-Windows-v${{ steps.version.outputs.VERSION }}.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        # Sumber versi sama persis dengan job build-windows saat trigger tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Versi dari tag: $VERSION"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: SyncDashboard-Windows-v${{ steps.version.outputs.VERSION }}-zip
          path: ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sync Dashboard v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## 🔄 Inventory Sync Dashboard v${{ steps.version.outputs.VERSION }}

            ### Cara Install
            1. Download file `.zip` di bawah
            2. Extract ke folder mana saja
            3. Jalankan `sync_dashboard.exe`
            4. Buka **Settings** → isi path Python dan script `.py`

            ### Requirement
            - Windows 10 / 11 (64-bit)
            - Python 3.x ter-install di sistem

            ---
            Built automatically via GitHub Actions 🤖
          files: ./release-assets/*.zip
          draft: false
          prerelease: false